<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印鈔機監控台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>印鈔機<span>監控台</span></h1>
    <div class="header-right">
        <span class="bot-status" id="bot-status" title="機器人狀態">BOT: --</span>
        <span class="conn-dot conn-online" id="conn-dot" title="API 連線狀態"></span>
        <div class="refresh-timer" id="refresh-timer"></div>
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="paper" onclick="switchMode('paper')">模擬盤 (Paper)</button>
            <button class="mode-btn" data-mode="live" onclick="switchMode('live')">正式盤 (Live)</button>
        </div>
    </div>
</div>

<!-- Tabs -->
<div class="tabs">
    <button class="tab-btn active" data-tab="status" onclick="switchTab('status')">即時狀態 (Status)</button>
    <button class="tab-btn" data-tab="chart" onclick="switchTab('chart')">K 線圖 (Chart)</button>
    <button class="tab-btn" data-tab="trades" onclick="switchTab('trades')">交易記錄 (Trades)</button>
    <button class="tab-btn" data-tab="analytics" onclick="switchTab('analytics')">收益分析 (Analytics)</button>
    <button class="tab-btn" data-tab="logs" onclick="switchTab('logs')">系統日誌 (Logs)</button>
</div>

<!-- Tab 1: Status -->
<div id="tab-status" class="tab-content active">
    <div class="cards" id="status-cards"></div>
    <div id="gk-section"></div>
    <div id="entry-conditions"></div>
    <div id="recent-section"></div>
    <div id="health-section"></div>
</div>

<!-- Tab 2: Chart -->
<div id="tab-chart" class="tab-content">
    <div class="chart-container">
        <div id="main-chart"></div>
        <div id="gk-chart"></div>
    </div>
    <div class="chart-legend">
        <span class="legend-item"><span class="legend-dot" style="background:#42a5f5"></span>▲ L 做多</span>
        <span class="legend-item"><span class="legend-dot" style="background:#ff9800"></span>▼ S 做空</span>
        <span class="legend-item"><span class="legend-line-dash" style="border-color:#42a5f5"></span>持倉線</span>
        <span class="legend-item"><span class="legend-line" style="background:#f0b90b"></span>EMA20</span>
    </div>
    <div class="trade-tooltip" id="trade-tooltip"></div>
</div>

<!-- Tab 3: Trades -->
<div id="tab-trades" class="tab-content">
    <div class="filters" id="trade-filters"></div>
    <div class="table-wrap" id="trades-table-wrap"></div>
</div>

<!-- Tab 4: Analytics -->
<div id="tab-analytics" class="tab-content">
    <div class="cards" id="analytics-cards"></div>
    <div class="analytics-row">
        <div class="analytics-panel">
            <h3>累計收益曲線 (Equity Curve)</h3>
            <div id="equity-chart"></div>
        </div>
        <div class="analytics-panel">
            <h3>每日損益 (Daily P&amp;L)</h3>
            <div id="daily-chart"></div>
        </div>
    </div>
    <div class="analytics-row">
        <div class="analytics-panel">
            <h3>出場原因分佈 (Exit Reasons)</h3>
            <div id="exit-dist"></div>
        </div>
        <div class="analytics-panel">
            <h3>策略比較 (L vs S)</h3>
            <div id="strat-compare"></div>
        </div>
    </div>
</div>

<!-- Tab 5: Logs -->
<div id="tab-logs" class="tab-content">
    <div class="log-toolbar">
        <div class="log-file-tabs">
            <button class="log-tab active" data-file="system" onclick="switchLogFile('system')">系統日誌 (system)</button>
            <button class="log-tab" data-file="signal" onclick="switchLogFile('signal')">信號日誌 (signal)</button>
            <button class="log-tab" data-file="alerts" onclick="switchLogFile('alerts')">告警日誌 (alerts)</button>
        </div>
        <div class="log-controls">
            <select id="log-lines" onchange="loadLogs()">
                <option value="100">100 行</option>
                <option value="200" selected>200 行</option>
                <option value="500">500 行</option>
                <option value="1000">1000 行</option>
            </select>
            <label class="log-auto-scroll">
                <input type="checkbox" id="log-auto-scroll" checked> 自動捲動
            </label>
        </div>
    </div>
    <div class="log-viewer" id="log-viewer">
        <div class="loading">載入中...</div>
    </div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
